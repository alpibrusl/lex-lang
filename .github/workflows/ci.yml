name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # std.arrow + std.df pull in arrow-rs + Polars, which roughly
      # doubles target/ to ~16 GB in debug. ubuntu-latest ships with
      # ~14 GB free; reclaim the preinstalled stacks we don't use
      # (.NET, Haskell, Android, Docker images), the hosted tool
      # cache, large apt packages, *and* the runner's swap file —
      # 4 GB extra headroom on top of the ~10 GB the other flags
      # buy, needed because PR #509 (and any follow-on test binary)
      # hits rust-lld SIGBUS during link when the margin runs out
      # mid-cargo-test. Costs ~2-3 min of setup for ~14 GB total.
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `cargo build --workspace --all-targets` would duplicate work —
      # `cargo test` already compiles every test target. Dropping the
      # standalone build step halves the peak debug-target footprint.
      - run: cargo test --workspace --no-fail-fast
      # `quic` is an opt-in feature on lex-runtime (#496). Build +
      # exercise the H/3 test separately so the default `cargo test`
      # step stays cheap — pulling in quinn + h3 + rcgen + rustls is
      # ~300 MB of additional dep-graph link cost we don't want to
      # pay on every workspace test. Tests under the feature are
      # all gated `#![cfg(feature = "quic")]`, so this single test
      # binary is enough.
      - run: cargo test -p lex-runtime --features quic --test net_serve_quic
      - run: cargo clippy --workspace --all-targets -- -D warnings
